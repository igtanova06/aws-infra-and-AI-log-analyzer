# --- AWS Configuration ---
aws_region: "{{ lookup('env', 'AWS_REGION') | default('ap-southeast-1', true) }}"

# --- Bedrock Configuration ---
bedrock_model: "us.amazon.nova-micro-v1:0"
max_tokens: 2000
temperature: 0.3

# --- Application Configuration ---
app_port: 8501

# --- Telegram Bot Configuration ---
telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') }}"
telegram_chat_id: "{{ lookup('env', 'TELEGRAM_CHAT_ID') }}"
telegram_alerts_enabled: true

# --- Patch Management ---
# Chỉ set true nếu bạn chủ động muốn apply security patches
apply_security_patches: false
