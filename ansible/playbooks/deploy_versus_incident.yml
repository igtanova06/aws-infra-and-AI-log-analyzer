---
- name: Deploy Versus Incident Alert Gateway
  hosts: role_app
  become: yes
  vars:
    telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') | default('') }}"
    telegram_chat_id: "{{ lookup('env', 'TELEGRAM_CHAT_ID') | default('') }}"
  
  tasks:
    - name: Verify Telegram credentials are set
      fail:
        msg: "TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID must be set as environment variables"
      when: telegram_bot_token == '' or telegram_chat_id == ''
    
    - name: Create Versus config directory
      file:
        path: /home/ec2-user/versus-config
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Deploy Versus config
      template:
        src: ../templates/versus_config.yaml.j2
        dest: /home/ec2-user/versus-config/config.yaml
        owner: ec2-user
        group: ec2-user
        mode: '0644'
    
    - name: Deploy Telegram message template
      template:
        src: ../templates/telegram_message.tmpl.j2
        dest: /home/ec2-user/versus-config/telegram_message.tmpl
        owner: ec2-user
        group: ec2-user
        mode: '0644'
    
    - name: Pull Versus Incident Docker image
      community.docker.docker_image:
        name: ghcr.io/versuscontrol/versus-incident
        tag: latest
        source: pull
      register: pull_result
      retries: 3
      delay: 10
      until: pull_result is succeeded
    
    - name: Stop existing Versus Incident container (if any)
      community.docker.docker_container:
        name: versus-incident
        state: absent
      ignore_errors: yes
    
    - name: Run Versus Incident container
      community.docker.docker_container:
        name: versus-incident
        image: ghcr.io/versuscontrol/versus-incident:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "3000:3000"
        env:
          TELEGRAM_ENABLE: "true"
          TELEGRAM_BOT_TOKEN: "{{ telegram_bot_token }}"
          TELEGRAM_CHAT_ID: "{{ telegram_chat_id }}"
        volumes:
          - /home/ec2-user/versus-config:/app/config:ro
        networks:
          - name: bridge
    
    - name: Wait for Versus Incident to be ready
      uri:
        url: http://localhost:3000/health
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes
    
    - name: Display Versus Incident status
      debug:
        msg: "Versus Incident is running on port 3000"
