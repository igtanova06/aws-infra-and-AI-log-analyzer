---
- name: Deploy Student Management Web App
  hosts: role_web
  become: yes
  vars:
    app_name: student-management-app
    host_port: 8080
    container_port: 80
    log_dir: /var/log/app

  tasks:
    - name: Create application log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Ensure destination directory exists
      file:
        path: "/home/ec2-user/{{ app_name }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy PHP source code to remote host
      copy:
        src: "../../Web-Project-1/"
        dest: "/home/ec2-user/{{ app_name }}/"
        owner: ec2-user
        group: ec2-user

    - name: Build PHP Docker image
      community.docker.docker_image:
        name: "{{ app_name }}"
        build:
          path: "/home/ec2-user/{{ app_name }}"
        source: build
        state: present
      async: 900
      poll: 10

    - name: Run PHP Web App container with logging
      community.docker.docker_container:
        name: "{{ app_name }}"
        image: "{{ app_name }}:latest"
        state: started
        restart_policy: unless-stopped
        recreate: yes
        ports:
          - "{{ host_port }}:{{ container_port }}"
        volumes:
          - "{{ log_dir }}:/var/log/app:rw"
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"
        env:
          PHP_ERROR_LOG: "/var/log/app/php-error.log"
          APP_LOG_FILE: "/var/log/app/application.log"

    - name: Configure PHP error logging in container
      shell: |
        docker exec {{ app_name }} bash -c "echo 'error_log = /var/log/app/php-error.log' >> /usr/local/etc/php/php.ini" || true
        docker exec {{ app_name }} bash -c "echo 'log_errors = On' >> /usr/local/etc/php/php.ini" || true
        docker restart {{ app_name }}
      ignore_errors: yes

    - name: Create application log file
      file:
        path: "{{ log_dir }}/application.log"
        state: touch
        owner: ec2-user
        group: ec2-user
        mode: '0644'

    - name: Create PHP error log file
      file:
        path: "{{ log_dir }}/php-error.log"
        state: touch
        owner: ec2-user
        group: ec2-user
        mode: '0644'
