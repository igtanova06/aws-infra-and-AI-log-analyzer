---
- name: Install Docker
  hosts: all
  become: yes
  tasks:
    - name: Install required system packages
      yum:
        name:
          - docker
          - git
          - python3-pip
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Install Python Docker SDK for Ansible docker modules
      pip:
        name:
          - docker
          - docker-compose
        executable: pip3
